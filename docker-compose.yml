version: '3.8'

networks:
  madhyam-net:
    driver: bridge

volumes:
  mongo-data:

services:

  # ── Nginx API Gateway ───────────────────────────────────────
  nginx:
    build:
      context: ./backend/nginx
    container_name: madhyam-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - auth-service
      - blog-service
    networks:
      - madhyam-net
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: madhyam-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - auth-service
    networks:
      - madhyam-net
    restart: unless-stopped

  # ── Auth Microservice ───────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      target: release
    container_name: madhyam-auth-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - madhyam-net
    restart: unless-stopped

  # ── Blog Microservice ───────────────────────────────────────
  blog-service:
    build:
      context: ./backend/blog-service
      target: release
    container_name: madhyam-blog-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/blog-service
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - madhyam-net
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: madhyam-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - madhyam-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: madhyam-redis
    networks:
      - madhyam-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
