version: '3.8'

services:
  app:
    build: 
      context: .
      target: release # Uses the final stage of the Dockerfile
    container_name: auth-service-app
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ACCESS_TOKEN_SECRET=your_access_token_secret
      - REFRESH_TOKEN_SECRET=your_refresh_token_secret
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Test Runner Service
  test-runner:
    build: 
      context: .
      target: tester # Stops at the 'tester' stage in Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth-test-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=test
      - ACCESS_TOKEN_SECRET=test_access_token_secret
      - REFRESH_TOKEN_SECRET=test_refresh_token_secret
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm test

  mongo:
    image: mongo:6
    container_name: auth-service-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    container_name: auth-service-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo-data: